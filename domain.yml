responses:
  utter_greet:
    - text: "سلام! من دستیار راهنمایی دانشجویان کامپیوترم. چطور کمکتون کنم؟"

  utter_greet_howareyou:
    - text: "سلام! من خوبم ممنون که پرسیدی😊 اگه سوالی داشتی در خدمتم."

  utter_goodbye:
    - text: "خداحافظ، موفق باشید!"

  utter_how_are_you:
    - text: "من همیشه خوبم.😊 اگه سوالی داشتی می تونی بپرسی!"

  utter_appriciation:
    - text: "قربانت! خوشحالم مفید بودم 🌟"

  utter_insult:
    - text: "متاسفم اگه تجربه خوبی نداشتی🙏 سعی می کنم بهتر کمکت کنم"

  utter_out_of_scope:
    - text: "این موضوع خارج از حوزه کاری منه، ولی در مورد دانشگاه و امور دانشجویی هرچی بخوای در خدمتم 😊"

  utter_about:
    - text: "من یک ربات راهنمای دانشجویانم 😊 برای کمک به سوالات مربوط به دانشگاه پیام نور، واحدها، امتحانات و کارهای اداری ساخته شدم."

  utter_funny:
    - text: "شوخیت قشنگ بود 😄 ولی من فقط می‌تونم در مورد موضوعات دانشجویی کمکت کنم."

  utter_bot_feeling:
    - text: "من احساسات انسانی ندارم ولی همیشه آماده‌ام بهت کمک کنم 😊"

  utter_irrelevant_requests:
    - text: "این کارها از توان من خارجه، ولی برای سوالات دانشجویی کاملاً در خدمتت هستم 😊"

  utter_smalltalk:
    - text: "می‌فهمم، دغدغه‌های دانشجویی همیشه زیاده 😊 اگر درباره کلاس‌ها، امتحانا یا قوانین سوال داری بگو تا راهنمایی‌ات کنم."

  utter_assurance:
    - text: "منابعی که من ازشون برای جواب استفاده می کنم کاملا معتبر و جدیدن. می تونی مطمئن باشی.🙏"

  utter_misunderstood:
    - text: "ببخشید اگه اشتباه متوجه شدم🙏 لطفا دوباره بگو دقیقا منظورت چیه تا بهتر راهنمایی کنم."

  utter_user_says_bad:
    - text: "متاسفم که حالت خوب نیست. امیدوارم هر چه زودتر حالت بهتر بشه. اگر سوال داشتی در خدمتم."

  utter_faq_address_pnu_urmia:
    - text: "آدرس: خیابان ۸ شهریور، خیابان عارف، دانشگاه پیام نور"

  utter_faq_golestan_link:
    - text: "سایت گلستان به آدرس reg.pnu.ac.ir"

  utter_faq_course_chart:
    - text: "چارت ها و برنامه های رشته ها و دروس را می‌توان از سایت pnu.ac.ir دریافت کرد."

  utter_faq_guest_request:
    - text: "درخواست مهمانی در تاریخ ارائه شده در سایت گلستان باید ثبت شده و توسط کارشناس آموزشی تایید شود."

  utter_faq_permanent_guest:
    - text: "مهمان دائم یعنی به طور دائم در یک مرکز دیگر پیام‌نور مشغول به تحصیل باشید اما مدارک شما در مرکز اصلی که قبول شدید باقی خواهد ماند. و مهمان موقت یعنی به صورت ترمی در یک مرکز دیگر از مرکز اصلی خودتان مشغول به تحصیل باشید و فقط یک ترم اعتبار دارد."

  utter_faq_change_major:
    - text: "در دانشگاه پیام نور فقط یک بار پس از گذراندن حداقل ۱۲ واحد با معدل ۱۲ می‌توان به رشته‌هایی که در مرکز خودتان وجود دارد تغییر رشته دهید."

  utter_faq_course_selection_time:
    - text: "انتخاب واحد در زمان مشخص شده در تقویم آموزشی در سایت گلستان پس از پرداخت شهریه ثابت انجام می‌شوند."

  utter_faq_course_selection_adddrop:
  - text: "بله، جای نگرانی نیست. دانشجویان در زمان حذف و اضافه نیز می‌توانند انتخاب واحد کنند."

  utter_faq_golestan_locked_payment:
    - text: "پس از قفل شدن سایت گلستان، دانشجویان باید شهریه متغیر آن ترم را پرداخت کنند تا بتوانند از خدمات سایت بهره‌مند شوند."

  utter_faq_course_equivalency:
    - text: "دانشجویان در صورتی که قبلاً در یک رشته دیگر تحصیل کرده اند می‌توانند در زمان مشخص شده در تقویم آموزشی نسبت به معادل سازی واحد های مشترک پاس شده، اقدام کنند."

  utter_faq_education_system:
    - text: "سیستم آموزشی دانشگاه پیام‌نور به صورت رفع اشکال در کلاس های حضوری و غیرحضوری تنظیم شده است. در دانشگاه پیام نور به غیر از دروس عملی, در بقیه درس ها شامل دروس تئوری حضوری و مجازی, حضور در کلاس اجباری نمی باشد."

  utter_faq_lms_reline_online:
    - text: "کلاس های غیر حضوری در سایت ریلاین به آدرس lms.az.pnu.ac.ir برگزار می‌شوند. دانشجویان برای شرکت در کلاس های غیرحضوری باید در سایت ریلاین وارد شده و با استفاده از نرم افزار adobe connect وارد کلاس شوند."

  utter_faq_golestan_report101:
    - text: "برگه انتخاب واحد و برنامه کلاسی دانشجویان در سایت گلستان از طریق گزارش ۱۰۱ قابل مشاهده است."

  utter_faq_golestan_report272:
    - text: "دانشجویان می‌توانند برگه تطبیق واحد خود را از در سایت گلستان از طریق گزارش ۲۷۲ مشاهده کنند."

  utter_faq_golestan_report423:
    - text: "برنامه کلاسی دانشجویان پس از پرداخت شهریه متغیر از طریق گزارش ۴۲۳ در سایت گلستان قابل مشاهده است."

  utter_faq_golestan_report428:
    - text: "کارت ورود به جلسه دانشجویان پس از پرداخت شهریه متغیر از طریق گزارش ۴۲۸ یک هفته پیش از شروع امتحانات در سایت گلستان قابل دریافت است."

  utter_faq_golestan_professor_evaluation:
    - text: "ارزشیابی اساتید در طول ترم از طریق سایت گلستان انجام می‌شود."

  utter_faq_exam_location_meaning:
    - text: "تغییر محل آزمون در زمان مشخص شده در تقویم آموزشی از طریق سایت گلستان انجام می‌شود. تغییر محل آزمون یعنی دانشجو در امتحانات نهایی ترم مشخص شده خود را در مرکزی به غیر از مرکز اصلی خود شرکت کند."

  utter_faq_exam_theory_scores:
    - text: "نمرات دروس تئوری از ۸ نمره میانترم و ۱۲ نمره پایان ترم تشکیل شده است. در صورت نداشتن میانترم نمره پایانی دانشجویان به جای ۱۲، از ۲۰ حساب خواهد شد. نمره دانشجویان در امتحان پایانی هم بدون میانترم از نمره 20 و هم همراه با میانترم از نمره 12 حساب شده و سیستم خودش هر کدام که بیشتر باشد آن را ثبت می کند."

  utter_faq_golestan_report102:
    - text: "دانشجویان می‌توانند از طریق گزارش ۱۰۲ در سایت گلستان، دروس ارائه شده در ترم جاری و شرایط اخذ آن را مشاهده نمایند."

  utter_faq_tuition_fixed_payment:
    - text: "دانشجویان باید شهریه ثابت خود را در سایت گلستان پرداخت کنند تا بتوانند انتخاب واحد را انجام دهند. این پرداخت باید در زمان مقرر شده در تقویم آموزشی انجام گیرد."

  utter_faq_golestan_study_certificate:
    - text: "دانشجویان می‌توانند از طریق پیشخوان خدمت در سایت گلستان درخواست گواهی اشتغال به تحصیل بدهند."

  utter_faq_golestan_change_major_request:
    - text: "دانشجویان می‌توانند از طریق پیشخوان خدمت در سایت گلستان تقاضای تغییر رشته یا گرایش دهند."

  utter_faq_final_term_request:
    - text: "درصورتی که تعداد واحد های باقی مانده کمتر از ۲۴ واحد باشد دانشجویان می‌توانند درخواست ترم آخر دهند تا بدون رعایت پیش‌نیاز ها بتوانند تا ۲۴ واحد اخذ نمایند."

  utter_faq_course_introduction_to_professor:
    - text: "درصورتی ‌که حداکثر دو درس تئوری بدون توجه به تعداد واحد ها باقی مانده باشد و دانشجو می‌تواند آن دو درس را معرفی به استاد کند. دانشجویان می‌توانند از طریق پیشخوان خدمت در سایت گلستان، درخواست معرفی به استاد بدهند."

  utter_faq_study_extension_male_students:
    - text: "دانشجویان پسر درصورت داشتن واحد باقیمانده پس از ۸ ترم، می‌توانند تا یک سال سنوات تحصیلی خود را تمدید کنند."

  utter_faq_academic_leave_duration:
    - text: "دانشجویان تا دو ترم تحصیلی می‌توانند درخواست مرخصی تحصیلی دهند. درخواست مرخصی تحصیلی از طریق پیشخوان خدمت در سایت گلستان انجام می‌گیرد."

  utter_faq_golestan_exam_results:
    - text: "دانشجویان از طریق بخش مشاهده نتایج آزمون دانشجو در سایت گلستان، نتایج آزمون های میانترم و پایان ترم خود در ترم جاری را مشاهده کنند. همچنین می‌توانند از طریق بخش اطلاعات جامع دانشجو واحد های اخذ شده و نمرات تمامی ترم های گذارنده خود را به تفکیک ترم مشاهده کنند."

  utter_faq_cs_total_units:
    - text: "مجموع واحد های لازم‌الاخذ دانشجویان مهندسی کامپیوتر ورودی ۹۷ تا ۱۴۰۳، ۱۳۹ واحد می‌باشد."

  utter_faq_cs_specialization_packages:
    - text: "دانشجویان مهندسی کامپیوتر ورودی ۹۷ تا ۱۴۰۳ می‌بایست دو بسته از بسته های تخصصی را انتخاب کرده و از یکی از این بسته ها ۱۸ واحد و از بسته دیگر ۱۲ واحد را اخذ نماید."

  utter_faq_cs_duplicate_courses_in_packages:
    - text: "درصورتی که درسی در دو بسته انتخابی دانشجو مشترک باشد فقط در یکی از بسته‌ها به عنوان واحد درسی گذرانده شده آن بسته در نظر گرفته می‌شود."

  utter_faq_cs_elective_courses_units:
    - text: "دانشجویان مهندسی کامپیوتر باید ۱۲ واحد از دروس اختیاری ارائه شده را اخذ کنند."

  utter_faq_cs_additional_elective_courses:
    - text: "دروس اختیاری مازاد شامل سه درس شناخت محیط زیست، کلیات حقوق شهروندی و مکتب شهید سلیمانی می‌باشد. دروس اختیاری مازاد، بر سقف واحد های دوره تاثیر نگذاشته اما با ثبت نمره و تاثیر در معدل در کارنامه دانشجو درج می‌شود."

  utter_faq_quran_course_info:
    - text: "دانشجویان می‌توانند درس حفظ جزء سی قرآن کریم را بدون پرداخت شهریه و با تاثیر مثبت در معدل انتخاب نمایند."

  utter_faq_special_physical_education_courses:
    - text: "دو درس تربیت بدنی ویژه و ورزش ویژه برای دانشجویانی که دارای شرایط جسمانی ویژه هستند ارائه شده است."

  utter_faq_quran_nahj_course_selection:
    - text: "دانشجویان از دو درس تفسیر موضوعی قرآن کریم و تفسیر موضوعی نهج البلاغه، ملزم به اخذ فقط یک عنوان درسی می‌باشند."

  utter_faq_ethics_courses_selection:
    - text: "دانشجویان از سه درس آیین زندگی(اخلاق کاربردی)، فلسفه اخلاق(با تکیه بر مباحث تربیتی) و اخلاق اسلامی(مبانی و مفاهیم)، ملزم به اخذ فقط یک عنوان درسی می‌باشند."

  utter_faq_internship_location_and_conditions:
    - text: "درس کارآموزی شامل کار در داخل دانشگاه و بیرون دانشگاه برای افراد شاغل در شغل های مربوط به کامپیوتر است. مهلت انجام کارآموزی در همان ترم جاریست و دانشجویان پس از دادن برگه کارآموزی به استاد و تایید آن باید ۲۴۰ ساعت کار کنند تا کارآموزی آنها به اتمام برسد."

  utter_faq_internship_report_submission:
    - text: "پس از اتمام کارآموزی، دانشجویان موظفند گزارش کارآموزی خود را تحویل استاد بدهند تا نمره بگیرند."

  utter_faq_final_project_types:
    - text: "درس پروژه پایانی شامل دو بخش مقاله مروری و یک پروژه عملی می‌باشد که دانشجو می‌تواند بین آنها انتخاب کند. مهلت انجام پروژه پایانی یک ترم می‌باشد که می‌تواند تا یک و نیم ترم گسترش پیدا کند."

  utter_faq_cs_specialization_packages_list:
    - text: "بسته های تخصصی مهندسی کامپیوتر مخصوص ورودی های ۹۷ تا ۱۴۰۳، شامل چهار بسته طراحی و توسعه نرم‌افزار، سیستم های کامپیوتری، شبکه‌های کامپیوتری و هوش مصنوعی می‌باشد.‌"

  utter_faq_golestan_password_reset:
    - text: "دانشجویان در صورت فراموش کردن رمز عبور گلستان خود, باید به کارشناس رشته خود برای بازیابی و تغییر رمز مراجعه کنند."

  utter_faq_exam_passing_grade_9_5:
    - text: "دانشجویان اگر نمره 9.5 را در امتحان پایانی بگیرند, سیستم آن را 10 کرده و امتحان را پاس می شوند."

  utter_faq_exam_absence_effect:
    - text: "اگر دانشجویی در یک امتحان غیبت کند, آن درس برایش حذف شده و هیچ نمره ای برایش ثبت نمی شود."

  utter_faq_graduation_request:
    - text: "دانشجویان پس از اخذ و گذراندن تمامی واحد های ارائه شده خود و ثبت و تایید نمرات آنها می توانند درخواست فارغ‌التحصیلی داده و تسویه کنند."

  utter_faq_reline_login_credentials:
    - text: "دانشجویان برای ورود به سامانه ریلاین باید برای نام کاربری, شماره دانشجویی خود و برای رمز عبور, کد ملی +aA را وارد کنند."

  utter_faq_minimum_units_per_semester:
    - text: "حداقل واحدی که میتوان در یک ترم برداشت, 12 واحد است. دانشجویان با نمره الف می توانند تا 24 واحد بردارند, دانشجویان غیر الف تا 20 واحد و سقف انتخاب واحد دانشجویان مشروط شده 14 واحد می باشد."

  utter_faq_emergency_removal:
